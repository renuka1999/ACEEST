name: ACEest Fitness CI/CD Pipeline

# Triggered on every push and pull_request to any branch
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ============================================================
  # STAGE 1: BUILD & LINT
  # Install dependencies and check for syntax/style errors
  # ============================================================
  build-and-lint:
    name: "Stage 1: Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint — syntax errors (hard fail)
        run: |
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — style warnings (soft check)
        run: |
          flake8 app.py --count --max-complexity=10 --max-line-length=120 --statistics

  # ============================================================
  # STAGE 2: DOCKER IMAGE ASSEMBLY
  # Build the Docker image to verify it compiles correctly
  # ============================================================
  docker-build:
    name: "Stage 2: Docker Image Assembly"
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness:${{ github.sha }} .

      - name: Verify image exists
        run: |
          docker images aceest-fitness:${{ github.sha }}

      # Save image as a tar artifact so the test stage can load it
      # without rebuilding — saves time and guarantees same image is tested
      - name: Export image as artifact
        run: |
          docker save aceest-fitness:${{ github.sha }} -o aceest-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: aceest-image.tar
          retention-days: 1

  # ============================================================
  # STAGE 3: AUTOMATED TESTING (inside the Docker container)
  # Load the image built in Stage 2, run Pytest inside it
  # ============================================================
  test-in-docker:
    name: "Stage 3: Automated Testing (in Docker)"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: |
          docker load -i aceest-image.tar

      - name: Prepare test-results directory
        run: |
          mkdir -p test-results
          chmod 777 test-results

      # Run the full Pytest suite INSIDE the container
      # Mount test file in, mount results out
      - name: Run Pytest inside Docker container
        run: |
          docker run --rm \
            -e DB_NAME=/tmp/test_aceest.db \
            -v ${{ github.workspace }}/test_app.py:/app/test_app.py:ro \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            --entrypoint "" \
            aceest-fitness:${{ github.sha }} \
            python -m pytest test_app.py -v --tb=short \
              --junitxml=test-results/junit.xml

      - name: Publish test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/junit.xml
        if: always()

      # Final smoke test: container starts and /health responds 200
      - name: Container smoke test
        run: |
          docker run -d \
            --name aceest-smoke \
            -p 5000:5000 \
            -e DB_NAME=/tmp/smoke.db \
            aceest-fitness:${{ github.sha }}
          sleep 8
          curl --fail --silent http://localhost:5000/health
          docker stop aceest-smoke

  # ============================================================
  # PIPELINE SUMMARY
  # ============================================================
  pipeline-complete:
    name: "Pipeline Complete ✓"
    runs-on: ubuntu-latest
    needs: [build-and-lint, docker-build, test-in-docker]
    if: success()

    steps:
      - name: Summary
        run: |
          echo "========================================"
          echo "  ACEest CI/CD Pipeline PASSED"
          echo "  Stage 1: Lint          ✓"
          echo "  Stage 2: Docker Build  ✓"
          echo "  Stage 3: Tests in Docker ✓"
          echo "========================================"
