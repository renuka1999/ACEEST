# ============================================================
# ACEest Fitness & Gym — Docker Compose
# For local development and testing
# ============================================================

version: "3.9"

services:
  aceest:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: aceest-fitness
    image: aceest-fitness:latest
    ports:
      - "5000:5000"
    volumes:
      # Persist SQLite database across container restarts
      - aceest_data:/data
    environment:
      - FLASK_ENV=production
      - DB_NAME=/data/aceest_fitness.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  aceest_data:
    driver: local
